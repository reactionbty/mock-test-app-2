<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Pro Max</title>

<style>
body {
    margin: 0;
    background: #0f0f0f;
    color: white;
    font-family: Roboto, Arial;
}

header {
    padding: 12px;
    font-size: 18px;
    font-weight: bold;
    border-bottom: 1px solid #222;
}
header span { color: red; }

.container { padding: 10px; }

.input-group {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
}

input {
    flex: 1;
    padding: 14px;
    border-radius: 25px;
    background: #121212;
    border: 1px solid #333;
    color: white;
}

button {
    padding: 12px 16px;
    border-radius: 20px;
    background: red;
    color: white;
    border: none;
}

/* PLAYLISTS */
.playlists {
    display: flex;
    gap: 12px;
    overflow-x: auto;
    margin-bottom: 15px;
}

.playlist-card {
    min-width: 160px;
    background: #1c1c1c;
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
}

.playlist-card img {
    width: 100%;
    height: 90px;
    object-fit: cover;
}

.playlist-title {
    font-size: 13px;
    padding: 8px;
}

/* PLAYER */
#player-wrapper {
    width: 100%;
    aspect-ratio: 16/9;
    background: black;
    margin-bottom: 10px;
    display: none;
    position: relative;
}

#yt-player, #yt-player iframe {
    width: 100%;
    height: 100%;
    position: absolute;
}

/* VIDEOS */
.video-item {
    display: flex;
    gap: 10px;
    margin-bottom: 14px;
    cursor: pointer;
}

.thumb img {
    width: 140px;
    height: 80px;
    border-radius: 8px;
}

.video-title {
    font-size: 14px;
    flex: 1;
}

.meta {
    font-size: 12px;
    color: #aaa;
}
</style>
</head>

<body>

<header>You<span>Tube</span> Pro Max</header>

<div class="container">

<div class="input-group">
<input id="input" placeholder="Paste link or search anything">
<button onclick="handleInput()">Go</button>
</div>

<div class="playlists" id="playlist-container"></div>

<div id="player-wrapper">
<div id="yt-player"></div>
</div>

<div id="list"></div>

</div>

<script>
const API_KEY = "AIzaSyD3lwrj6k_x6dzUJcMyJgTO3EU7Y3ZReuI";

const PLAYLISTS = [
{ id: "PLskZSOOB3IjFBn8cnNvLbSon_bmG1-A42", title: "English Playlist" },
{ id: "PLskZSOOB3IjFz9emrRMcVRoi3Edp7LVGV", title: "Math Playlist" }
];

let player = null;
let trackTimer = null;

/* STORAGE */
function saveProgress(id, time) {
localStorage.setItem(id, JSON.stringify({ time }));
}
function getProgress(id) {
let d = localStorage.getItem(id);
return d ? JSON.parse(d) : null;
}

/* TIME */
function formatTime(sec) {
sec = Math.floor(sec);
let m = Math.floor(sec/60);
let s = sec % 60;
return m + ":" + (s<10?"0"+s:s);
}

/* INPUT */
function handleInput() {
let val = document.getElementById("input").value.trim();

if (val.includes("list=")) {
let id = val.match(/list=([^&]+)/)[1];
loadPlaylist(id);
}
else if (val.includes("watch?v=")) {
let id = val.match(/v=([^&]+)/)[1];
playVideo(id);
}
else {
searchVideos(val);
}
}

/* PLAYER */
function playVideo(id) {
document.getElementById("player-wrapper").style.display = "block";

let saved = getProgress(id);
let start = saved ? saved.time : 0;

if (!player) {
player = new YT.Player("yt-player", {
videoId: id,
playerVars: { autoplay: 1, start },
events: {
onReady: e => {
e.target.playVideo();
startTracking();
}
}
});
} else {
player.loadVideoById({ videoId: id, startSeconds: start });
}

window.scrollTo({ top: 0, behavior: "smooth" });
}

/* TRACK */
function startTracking() {
if (trackTimer) clearInterval(trackTimer);

trackTimer = setInterval(() => {
if (!player || !player.getCurrentTime) return;

let time = player.getCurrentTime();
let vid = player.getVideoData().video_id;

if (vid && time > 1) saveProgress(vid, time);
}, 2000);
}

/* PLAYLIST UI */
async function loadPlaylistsUI() {
let container = document.getElementById("playlist-container");

for (let p of PLAYLISTS) {
try {
let api = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&maxResults=1&playlistId=${p.id}&key=${API_KEY}`;
let res = await fetch(api);
let data = await res.json();

let thumb = data.items?.[0]?.snippet?.thumbnails?.medium?.url
|| "https://via.placeholder.com/160x90";

let div = document.createElement("div");
div.className = "playlist-card";

div.innerHTML = `
<img src="${thumb}">
<div class="playlist-title">${p.title}</div>
`;

div.onclick = () => loadPlaylist(p.id);

container.appendChild(div);

} catch (e) {
console.log("Playlist UI error", e);
}
}
}

/* 🔥 FIXED PLAYLIST LOADER */
async function loadPlaylist(id) {
try {
let videos = [];
let nextPage = "";

do {
let api = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&maxResults=50&playlistId=${id}&key=${API_KEY}&pageToken=${nextPage}`;

let res = await fetch(api);
let data = await res.json();

if (data.error) {
console.error(data.error);
return;
}

if (!data.items) break;

let valid = data.items
.filter(v => v.snippet?.resourceId?.videoId)
.map(v => ({
id: v.snippet.resourceId.videoId,
title: v.snippet.title,
thumb: v.snippet.thumbnails?.medium?.url || "https://via.placeholder.com/160x90"
}));

videos.push(...valid);

nextPage = data.nextPageToken || "";

} while (nextPage);

if (videos.length === 0) {
alert("No playable videos found");
return;
}

showVideos(videos);

} catch (err) {
console.error(err);
alert("Failed to load playlist");
}
}

/* SEARCH */
async function searchVideos(q) {
try {
let api = `https://www.googleapis.com/youtube/v3/search?part=snippet&type=video,playlist&maxResults=20&q=${q}&key=${API_KEY}`;
let res = await fetch(api);
let data = await res.json();

let results = data.items.map(v => {
if (v.id.kind === "youtube#video") {
return {
type: "video",
id: v.id.videoId,
title: v.snippet.title,
thumb: v.snippet.thumbnails.medium.url
};
} else {
return {
type: "playlist",
id: v.id.playlistId,
title: "📁 " + v.snippet.title,
thumb: v.snippet.thumbnails.medium.url
};
}
});

showVideos(results);

} catch {
alert("Search failed");
}
}

/* SHOW */
function showVideos(videos) {
let list = document.getElementById("list");
list.innerHTML = "";

videos.forEach(v => {
let saved = getProgress(v.id);

let div = document.createElement("div");
div.className = "video-item";

div.innerHTML = `
<div class="thumb"><img src="${v.thumb}"></div>
<div class="video-title">
${v.title}
<div class="meta">
${saved ? "▶ Continue at " + formatTime(saved.time) : ""}
</div>
</div>
`;

div.onclick = () => {
if (v.type === "playlist") loadPlaylist(v.id);
else playVideo(v.id);
};

list.appendChild(div);
});
}

/* LOAD YT */
let tag = document.createElement('script');
tag.src = "https://www.youtube.com/iframe_api";
document.body.appendChild(tag);

/* INIT */
loadPlaylistsUI();
</script>

</body>
</html>
